<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin Login — Teemie Portfolio</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --purple: #b478ff; --teal: #7de8d0;
    --bg: #0a0a0f; --bg3: #141420;
    --text: #f0ede8; --text-muted: rgba(240,237,232,0.55);
    --border: rgba(255,255,255,0.08);
  }
  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--bg); color: var(--text);
    min-height: 100vh; display: flex; align-items: center; justify-content: center;
    position: relative; overflow: hidden;
  }
  .orb1 { position: absolute; width: 500px; height: 500px; background: radial-gradient(circle, rgba(180,120,255,0.1) 0%, transparent 65%); top: -150px; right: -100px; pointer-events: none; }
  .orb2 { position: absolute; width: 400px; height: 400px; background: radial-gradient(circle, rgba(125,232,208,0.08) 0%, transparent 65%); bottom: -100px; left: -100px; pointer-events: none; }

  .login-card {
    background: rgba(255,255,255,0.03); border: 1px solid var(--border);
    border-radius: 28px; padding: 3rem 2.5rem; width: 100%; max-width: 400px;
    position: relative; z-index: 1;
    animation: fade-in 0.6s ease both;
  }
  @keyframes fade-in { from { opacity:0; transform:translateY(20px); } to { opacity:1; transform:translateY(0); } }

  .login-logo { font-family: 'Playfair Display', serif; font-size: 1.5rem; color: var(--text); margin-bottom: 0.25rem; }
  .login-subtitle { font-size: 12px; color: var(--text-muted); margin-bottom: 2.5rem; letter-spacing: 0.5px; }

  .form-group { margin-bottom: 1.5rem; }
  label { display: block; font-size: 11px; letter-spacing: 2px; text-transform: uppercase; color: var(--text-muted); margin-bottom: 0.5rem; }
  input[type="password"] {
    width: 100%; padding: 13px 16px;
    background: rgba(255,255,255,0.04); border: 1px solid var(--border);
    border-radius: 12px; color: var(--text); font-family: 'DM Sans', sans-serif;
    font-size: 14px; outline: none; transition: border-color 0.2s;
  }
  input[type="password"]:focus { border-color: rgba(180,120,255,0.5); }

  .login-btn {
    width: 100%; padding: 14px;
    background: linear-gradient(135deg, var(--purple), var(--teal));
    color: #0a0a0f; font-family: 'DM Sans', sans-serif;
    font-weight: 600; font-size: 14px; letter-spacing: 0.5px;
    border: none; border-radius: 100px; cursor: pointer;
    transition: opacity 0.2s;
  }
  .login-btn:hover { opacity: 0.88; }

  .error-msg {
    background: rgba(255,107,157,0.1); border: 1px solid rgba(255,107,157,0.3);
    border-radius: 10px; padding: 10px 14px;
    font-size: 13px; color: #ff6b9d; margin-bottom: 1.5rem;
    display: none;
  }
  .error-msg.show { display: block; }

  .back-link { display: block; text-align: center; margin-top: 1.5rem; font-size: 12px; color: var(--text-muted); text-decoration: none; transition: color 0.2s; }
  .back-link:hover { color: var(--text); }
</style>
</head>
<body>
<div class="orb1"></div>
<div class="orb2"></div>

<div class="login-card">
  <div class="login-logo">Teemie ✦ Admin</div>
  <div class="login-subtitle">Portfolio Management System</div>

  <div class="error-msg <?= isset($_GET['error']) ? 'show' : '' ?>" id="errorMsg">
    ⚠️ Incorrect password. Please try again.
  </div>

  <form method="POST" action="/admin/login">
    <div class="form-group">
      <label>Admin Password</label>
      <input type="password" name="password" placeholder="Enter your password" required autofocus>
    </div>
    <button type="submit" class="login-btn">Access Dashboard →</button>
  </form>

  <a href="/" class="back-link">← Back to Portfolio</a>
</div>

<script>
  // Show error if ?error=1 in URL
  if (window.location.search.includes('error=1')) {
    document.getElementById('errorMsg').classList.add('show');
  }
</script>
</body>
</html>
